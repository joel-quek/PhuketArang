<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Phuket Arang Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --header-bg: #111827;
      --blue: #2563eb;
      --dark: #374151;
      --red: #dc2626;
      --green: #059669;
      --orange-bg: #fff7ed;
      --orange-text: #7c2d12;
      --border: #e5e7eb;
      --muted: #6b7280;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    #app {
      height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    header {
      flex: 0 0 auto;
      padding: 11px 12px 9px;
      background: var(--header-bg);
      color: white;
      z-index: 1000;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      padding-top: 2px;
      letter-spacing: 0.2px;
    }

    header p {
      margin: 3px 0 0;
      font-size: 12px;
      opacity: 0.85;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      flex: 0 0 auto;
      display: flex;
      gap: 6px;
      padding: 7px 8px;
      overflow-x: auto;
      background: white;
      border-bottom: 1px solid var(--border);
      -webkit-overflow-scrolling: touch;
    }

    .controls::-webkit-scrollbar,
    .top-picks::-webkit-scrollbar,
    .decision-panel::-webkit-scrollbar { display: none; }

    button {
      border: none;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--blue);
      color: white;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    button.secondary { background: var(--dark); }
    button.home { background: var(--red); }
    button.share { background: var(--green); }
    button.warn { background: #b45309; }

    .decision-panel {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 7px 8px;
      background: #f9fafb;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .decision-title {
      font-size: 12px;
      font-weight: bold;
      color: #111827;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .top-picks {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .top-pick {
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 12px;
      color: #111827;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
    }

    #status {
      flex: 0 0 auto;
      padding: 7px 10px;
      font-size: 12px;
      background: var(--orange-bg);
      color: var(--orange-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #map {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
    }

    .home-marker { font-size: 30px; }
    .food-marker, .mall-marker, .attraction-marker, .massage-marker, .cat-marker, .durian-marker {
      font-size: 25px;
      text-align: center;
      line-height: 30px;
    }

    .leaflet-popup-content {
      font-size: 14px;
      line-height: 1.4;
      min-width: 220px;
      max-width: 260px;
      margin: 12px;
    }

    .popup-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .popup-note { margin-bottom: 6px; }

    .popup-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 6px 0 8px;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: bold;
      background: #eef2ff;
      color: #1e3a8a;
      white-space: nowrap;
    }

    .badge.open { background: #dcfce7; color: #166534; }
    .badge.closed { background: #fee2e2; color: #991b1b; }
    .badge.neutral { background: #f3f4f6; color: #374151; }
    .badge.rating { background: #fef3c7; color: #92400e; }

    .popup-small {
      font-size: 12px;
      color: #555;
      margin-bottom: 8px;
    }

    .popup-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .popup-actions a {
      display: inline-block;
      padding: 7px 9px;
      border-radius: 999px;
      background: var(--blue);
      color: white;
      text-decoration: none;
      font-size: 12px;
      font-weight: bold;
    }

    .popup-actions a.search { background: var(--dark); }
    .popup-actions a.live { background: #0f766e; }

    .data-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.3;
    }

    .vote-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      flex-wrap: wrap;
    }

    .vote-button {
      background: var(--green);
      padding: 7px 9px;
      font-size: 12px;
    }

    .vote-button.voted,
    .vote-button:disabled {
      background: #6b7280;
      cursor: not-allowed;
      opacity: 0.85;
    }

    .vote-count {
      font-weight: bold;
      color: #111827;
      background: #ecfdf5;
      border-radius: 999px;
      padding: 5px 8px;
    }

    @media (max-width: 480px) {
      header { padding: 10px 11px 8px; }
      header h1 { font-size: 16px; }
      header p { font-size: 11px; }
      .controls { padding: 6px 7px; gap: 5px; }
      button { font-size: 12px; padding: 8px 9px; }
      .decision-panel { padding: 6px 7px; }
      .top-pick { font-size: 11px; padding: 6px 8px; }
      #status { font-size: 11px; padding: 6px 9px; }
      .leaflet-popup-content { min-width: 205px; max-width: 235px; font-size: 13px; }
      .popup-title { font-size: 14px; }
    }
  </style>
</head>

<body>
<div id="app">
  <header>
    <h1>PHUKET ARANG</h1>
    <p>Urban Nook + food, malls, massage, cats, durian, votes & live info</p>
  </header>

  <div class="controls">
    <button onclick="findMe()">📍 Me</button>
    <button class="home" onclick="goHome()">🏠 HQ</button>
    <button onclick="openCheckpoint()">🚗 Checkpoint</button>
    <button class="secondary" onclick="filterMarkers('all')">All</button>
    <button class="secondary" onclick="filterMarkers('food')">🍜 Food</button>
    <button class="secondary" onclick="filterMarkers('mall')">🛍️ Malls</button>
    <button class="secondary" onclick="filterMarkers('massage')">💆 Massage</button>
    <button class="secondary" onclick="filterMarkers('cat')">🐱 Cats</button>
    <button class="secondary" onclick="filterMarkers('durian')">🍈 Durian</button>
    <button class="secondary" onclick="filterMarkers('attraction')">📸 Sights</button>
  </div>

  <div class="decision-panel">
    <div class="decision-title">🏆 Top Picks</div>
    <div id="topPicks" class="top-picks">Waiting for votes...</div>
  </div>

  <div id="status">Map centred near The Urban Nook. Tap Live Info in any popup for latest Google Maps data.</div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCWhhePl8hpHV12uwr0-4LWmuP1_CIrqYJI",
    authDomain: "phuket-arang.firebaseapp.com",
    projectId: "phuket-arang",
    storageBucket: "phuket-arang.firebasestorage.app",
    messagingSenderId: "352587072367",
    appId: "1:352587072367:web:62376cc321b84f57da5e9a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const voteCounts = {};
  const voteUnsubscribers = {};
  const voteInProgress = new Set();

  // No-API live info approach:
  // Ratings/hours below are manual guide values. The Live Info button opens the latest Google Maps listing.
  const DATA_LAST_CHECKED = "Apr 2026";
  const DATA_SOURCE = "Manual guide; tap Live Info for latest Google Maps data";

  const urbanNook = {
    name: "The Urban Nook",
    type: "home",
    lat: 1.4848,
    lng: 103.7666,
    address: "14, Jalan Rentaka 2, Taman Sri Tebrau, 80050 Johor Bahru",
    note: "Group accommodation",
    hours: "00:00-23:59",
    rating: "Home base"
  };

  const map = L.map("map", { zoomControl: true, tap: true }).setView([urbanNook.lat, urbanNook.lng], 15);

  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
  }).addTo(map);

  setTimeout(() => map.invalidateSize(), 300);

  let userMarker = null;
  let userCircle = null;
  let lastUserLocation = null;

  const homeIcon = L.divIcon({ html: "🏠", className: "home-marker", iconSize: [34,34], iconAnchor: [17,17] });
  const foodIcon = L.divIcon({ html: "🍜", className: "food-marker", iconSize: [30,30], iconAnchor: [15,15] });
  const mallIcon = L.divIcon({ html: "🛍️", className: "mall-marker", iconSize: [30,30], iconAnchor: [15,15] });
  const attractionIcon = L.divIcon({ html: "📸", className: "attraction-marker", iconSize: [30,30], iconAnchor: [15,15] });
  const massageIcon = L.divIcon({ html: "💆", className: "massage-marker", iconSize: [30,30], iconAnchor: [15,15] });
  const catIcon = L.divIcon({ html: "🐱", className: "cat-marker", iconSize: [30,30], iconAnchor: [15,15] });
  const durianIcon = L.divIcon({ html: "🍈", className: "durian-marker", iconSize: [30,30], iconAnchor: [15,15] });

  function getIcon(type) {
    if (type === "food") return foodIcon;
    if (type === "mall") return mallIcon;
    if (type === "massage") return massageIcon;
    if (type === "cat") return catIcon;
    if (type === "durian") return durianIcon;
    if (type === "attraction") return attractionIcon;
    return foodIcon;
  }

  function googleMapsSearch(place) {
    const query = encodeURIComponent(`${place.name} ${place.address || ""}`);
    return `https://www.google.com/maps/search/?api=1&query=${query}`;
  }

  function googleMapsLiveInfo(place) {
    // Same Google Maps search endpoint, labelled differently for users.
    // Opens the live listing so users can verify current hours, reviews, crowd level and photos.
    return googleMapsSearch(place);
  }

  function googleMapsDirections(place) {
    return `https://www.google.com/maps/dir/?api=1&destination=${place.lat},${place.lng}&travelmode=driving`;
  }

  function googleMapsLocationLink(lat, lng) {
    return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
  }

  function getDistanceKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  function distanceFromHome(lat, lng) {
    const distance = getDistanceKm(urbanNook.lat, urbanNook.lng, lat, lng);
    if (distance < 1) return `${Math.round(distance * 1000)}m from Urban Nook`;
    return `${distance.toFixed(1)}km from Urban Nook`;
  }

  function safeId(name) {
    return name.replace(/[^a-zA-Z0-9]/g, "");
  }

  function escapeJsString(text) {
    return String(text).replace(/\\/g, "\\\\").replace(/'/g, "\\'");
  }

  function voteStorageKey(placeName) {
    return "phuketArang_voted_" + safeId(placeName);
  }

  function hasVoted(placeName) {
    try {
      return localStorage.getItem(voteStorageKey(placeName)) === "1";
    } catch (err) {
      return false;
    }
  }

  function markVoted(placeName) {
    try {
      localStorage.setItem(voteStorageKey(placeName), "1");
    } catch (err) {
      console.warn("Could not save vote lock", err);
    }
  }

  function unmarkVoted(placeName) {
    try {
      localStorage.removeItem(voteStorageKey(placeName));
    } catch (err) {
      console.warn("Could not remove vote lock", err);
    }
  }

  function formatHours(hours) {
    if (!hours) return "Hours unknown";
    if (hours === "00:00-23:59") return "Open 24h / available anytime";
    return hours;
  }

  function isOpenNow(hours) {
    if (!hours || hours === "unknown") return null;
    if (hours === "00:00-23:59") return true;

    const [start, end] = hours.split("-");
    if (!start || !end) return null;

    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);
    const startMin = sh * 60 + sm;
    const endMin = eh * 60 + em;
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();

    if (endMin >= startMin) return nowMin >= startMin && nowMin <= endMin;
    return nowMin >= startMin || nowMin <= endMin;
  }

  function openBadge(place) {
    const open = isOpenNow(place.hours);
    if (open === true) return `<span class="badge open">🟢 Open now</span>`;
    if (open === false) return `<span class="badge closed">🔴 Closed now</span>`;
    return `<span class="badge neutral">⚪ Hours unknown</span>`;
  }

  function popupHtml(place) {
    const voteId = "vote-" + safeId(place.name);
    const votes = voteCounts[place.name] || 0;
    const alreadyVoted = hasVoted(place.name);
    const voteButtonText = alreadyVoted ? "✅ Voted" : "👍 Vote";
    const voteButtonDisabled = alreadyVoted ? "disabled" : "";
    const voteButtonClass = alreadyVoted ? "vote-button voted" : "vote-button";
    const ratingHtml = place.rating ? `<span class="badge rating">⭐ ${place.rating}</span>` : "";
    const priceHtml = place.price ? `<span class="badge neutral">${place.price}</span>` : "";
    const hoursHtml = place.hours ? `<span class="badge neutral">🕒 ${formatHours(place.hours)}</span>` : "";

    return `
      <div class="popup-title">${place.name} <span class="vote-count" id="${voteId}">👍 ${votes}</span></div>
      <div class="popup-note">${place.note}</div>
      <div class="popup-meta">
        ${openBadge(place)}
        ${ratingHtml}
        ${priceHtml}
        ${hoursHtml}
        <span class="badge neutral">📌 Checked ${place.lastChecked || DATA_LAST_CHECKED}</span>
      </div>
      <strong>${distanceFromHome(place.lat, place.lng)}</strong><br><br>
      <div class="popup-small">${place.address}</div>
      <div class="data-note">Hours/ratings are a guide. Tap <strong>Live Info</strong> for latest opening hours and Google reviews.</div>

      <div class="vote-row">
        <button class="${voteButtonClass}" onclick="vote('${escapeJsString(place.name)}')" ${voteButtonDisabled}>${voteButtonText}</button>
        <span class="vote-count" id="${voteId}-row">👍 ${votes}</span>
      </div>

      <div class="popup-actions">
        <a href="${googleMapsDirections(place)}" target="_blank">Directions</a>
        <a class="live" href="${googleMapsLiveInfo(place)}" target="_blank">Live Info</a>
        <a class="search" href="${googleMapsSearch(place)}" target="_blank">Maps</a>
      </div>
    `;
  }

  const homeMarker = L.marker([urbanNook.lat, urbanNook.lng], { icon: homeIcon }).addTo(map);

  homeMarker.bindPopup(`
    <div class="popup-title">🏠 ${urbanNook.name}</div>
    <div class="popup-note">${urbanNook.note}</div>
    <div class="popup-meta"><span class="badge open">🟢 Home base</span></div>
    <div class="popup-small">${urbanNook.address}</div>
    <div class="popup-actions">
      <a href="${googleMapsDirections(urbanNook)}" target="_blank">Directions</a>
      <a class="search" href="${googleMapsSearch(urbanNook)}" target="_blank">Maps</a>
    </div>
  `).openPopup();

  L.circle([urbanNook.lat, urbanNook.lng], {
    radius: 1200,
    color: "#dc2626",
    fillColor: "#dc2626",
    fillOpacity: 0.08
  }).addTo(map);

  const places = [
    // Food — near home / group-friendly
    { name: "Seng Steam Fish Restaurant", type: "food", lat: 1.487916, lng: 103.774656, address: "100, Jalan Keris, Taman Sri Tebrau, 80050 Johor Bahru", note: "Near house · dine-in / takeaway · steamed fish", hours: "11:00-22:00", rating: "4.0", price: "$$" },
    { name: "Sek Wai Sin JB Pelangi", type: "food", lat: 1.4833, lng: 103.7749, address: "205, Jalan Sri Pelangi, Taman Pelangi, 80400 Johor Bahru", note: "Near house · dine-in / takeaway · seafood noodle", hours: "10:00-21:00", rating: "4.1", price: "$$" },
    { name: "Farmland Porridge Steamboat", type: "food", lat: 1.4860, lng: 103.7650, address: "15, Jalan Badik 1, Taman Sri Tebrau, 80050 Johor Bahru", note: "Sri Tebrau · dine-in · porridge steamboat", hours: "16:00-01:00", rating: "4.1", price: "$$" },
    { name: "Hai Kee Seafood Restaurant", type: "food", lat: 1.4863, lng: 103.7653, address: "No. 21, Jalan Badik 1, Taman Sri Tebrau, 80050 Johor Bahru", note: "Sri Tebrau hawker centre · dine-in / takeaway", hours: "17:00-01:00", rating: "4.0", price: "$$" },
    { name: "Project Smoked", type: "food", lat: 1.4872, lng: 103.7667, address: "224, Jalan Sutera, Taman Sentosa, 80150 Johor Bahru", note: "American BBQ · dine-in / takeaway", hours: "12:00-22:00", rating: "4.5", price: "$$" },
    { name: "Restoran Pekin Taman Sentosa", type: "food", lat: 1.4929, lng: 103.7758, address: "38, Jalan Baldu 5, Taman Sentosa, 80150 Johor Bahru", note: "Chinese restaurant · suckling pig", hours: "11:00-22:00", rating: "4.1", price: "$$$" },
    { name: "Teck Sing Restaurant", type: "food", lat: 1.4871, lng: 103.7662, address: "3 & 5, Jalan Sutera Satu, Taman Sentosa, 80150 Johor Bahru", note: "Paper-baked herbal chicken", hours: "11:00-22:00", rating: "4.2", price: "$$" },
    { name: "Kam Long Ah Zai Curry Fish Head", type: "food", lat: 1.4596, lng: 103.7643, address: "74, Jalan Wong Ah Fook, 80000 Johor Bahru", note: "Famous curry fish head", hours: "08:00-16:00", rating: "4.0", price: "$$" },
    { name: "Canton-i @ Johor Bahru City Square", type: "food", lat: 1.4626, lng: 103.7634, address: "Lot J3-05, Level 3, Johor Bahru City Square", note: "Hong Kong cuisine", hours: "10:00-22:00", rating: "4.0", price: "$$" },
    { name: "Bottega JB", type: "food", lat: 1.4816, lng: 103.7660, address: "8, Jalan Meranti, Johor Bahru, 80250", note: "Italian cuisine", hours: "12:00-22:00", rating: "4.4", price: "$$$" },
    { name: "Warakuya Japanese Restaurant", type: "food", lat: 1.4818, lng: 103.7735, address: "43, Jalan Kuning 2, Taman Pelangi, 80400 Johor Bahru", note: "Japanese food", hours: "11:30-22:30", rating: "4.2", price: "$$" },
    { name: "Me & My RoRo", type: "food", lat: 1.4822, lng: 103.7722, address: "7, Jalan Kuning 1, Taman Pelangi, 80400 Johor Bahru", note: "Japanese handroll & tapas bar", hours: "12:00-23:00", rating: "4.4", price: "$$" },
    { name: "Restoran Ban Heong Seng", type: "food", lat: 1.536913, lng: 103.674204, address: "113, Jalan Impian Emas 22, Taman Impian Emas, 81300 Skudai", note: "Clay-baked beggar chicken & duck", hours: "11:00-21:00", rating: "4.1", price: "$$" },
    { name: "Restoran Pekin Johor Jaya", type: "food", lat: 1.52387, lng: 103.80706, address: "1, Jalan Masai Baru, Taman Johor Jaya, 81100 Johor Bahru", note: "Chinese restaurant", hours: "11:00-22:00", rating: "4.1", price: "$$$" },
    { name: "Ba Jiu Men Hotpot", type: "food", lat: 1.5585, lng: 103.7825, address: "Block B, G10, Jalan Jaya Putra 1/1, Bandar Jaya Putra", note: "Hotpot", hours: "12:00-02:00", rating: "4.4", price: "$$$" },

    // More food options
    { name: "Restoran Hua Mui", type: "food", lat: 1.4575, lng: 103.7618, address: "131, Jalan Trus, Bandar Johor Bahru, 80000 Johor Bahru", note: "Old-school Hainanese kopitiam", hours: "08:00-18:00", rating: "4.1", price: "$" },
    { name: "IT Roo Café", type: "food", lat: 1.4570, lng: 103.7612, address: "17, Jalan Dhoby, Bandar Johor Bahru, 80000 Johor Bahru", note: "Chicken chop / heritage café area", hours: "10:00-21:00", rating: "4.0", price: "$$" },
    { name: "Hiap Joo Bakery", type: "food", lat: 1.4568, lng: 103.7614, address: "13, Jalan Tan Hiok Nee, Bandar Johor Bahru, 80000 Johor Bahru", note: "Banana cake / bakery stop", hours: "07:30-17:00", rating: "4.2", price: "$" },

  const markerLayer = L.layerGroup().addTo(map);
  const allMarkers = [];

  places.forEach(place => {
    const marker = L.marker([place.lat, place.lng], { icon: getIcon(place.type) });
    marker.placeType = place.type;
    marker.placeData = place;

    // Important: use a function so Leaflet rebuilds the popup from the latest
    // voteCounts every time the marker is opened. This fixes stale popup counts.
    marker.bindPopup(() => popupHtml(place));

    // Extra safety: when the popup opens, immediately refresh its content again
    // in case Firebase votes arrived after the marker was first created.
    marker.on("popupopen", () => {
      marker.setPopupContent(popupHtml(place));
    });

    allMarkers.push(marker);
    markerLayer.addLayer(marker);
    listenVotes(place.name);
  });

  async function vote(placeName) {
    if (hasVoted(placeName)) {
      document.getElementById("status").textContent = `You already voted for ${placeName} on this device.`;
      refreshOpenPopup(placeName);
      return;
    }

    if (voteInProgress.has(placeName)) {
      document.getElementById("status").textContent = `Vote for ${placeName} is already being submitted...`;
      return;
    }

    voteInProgress.add(placeName);
    document.getElementById("status").textContent = `Submitting vote for ${placeName}...`;

    const ref = doc(db, "votes", placeName);

    try {
      await updateDoc(ref, { count: increment(1) });
      markVoted(placeName);
      refreshOpenPopup(placeName);
      document.getElementById("status").textContent = `Voted for ${placeName}.`;
    } catch (err) {
      try {
        await setDoc(ref, { count: 1 });
        markVoted(placeName);
        refreshOpenPopup(placeName);
        document.getElementById("status").textContent = `Voted for ${placeName}.`;
      } catch (finalErr) {
        unmarkVoted(placeName);
        console.error("Vote failed", finalErr);
        document.getElementById("status").textContent = "Vote failed. Please try again.";
        alert("Vote failed. Please try again.");
      }
    } finally {
      voteInProgress.delete(placeName);
    }
  }

  function listenVotes(placeName) {
    if (voteUnsubscribers[placeName]) return;

    const ref = doc(db, "votes", placeName);
    voteUnsubscribers[placeName] = onSnapshot(ref, (docSnap) => {
      const count = docSnap.exists() ? (docSnap.data().count || 0) : 0;
      voteCounts[placeName] = count;

      const el = document.getElementById("vote-" + safeId(placeName));
      if (el) el.textContent = `👍 ${count}`;
      const rowEl = document.getElementById("vote-" + safeId(placeName) + "-row");
      if (rowEl) rowEl.textContent = `👍 ${count}`;

      refreshOpenPopup(placeName);
      updateTopPicks();
    }, (err) => {
      console.error("Vote listener error", err);
      document.getElementById("status").textContent = "Vote sync issue. Check Firestore rules.";
    });
  }

  function refreshOpenPopup(placeName) {
    const openMarker = allMarkers.find(marker => marker.isPopupOpen && marker.isPopupOpen());
    if (!openMarker || !openMarker.placeData || openMarker.placeData.name !== placeName) return;
    openMarker.setPopupContent(popupHtml(openMarker.placeData));
  }

  function updateTopPicks() {
    const topPicksEl = document.getElementById("topPicks");
    const ranked = [...places]
      .map(place => ({ ...place, votes: voteCounts[place.name] || 0 }))
      .sort((a, b) => {
        if (b.votes !== a.votes) return b.votes - a.votes;
        if ((b.rating || 0) !== (a.rating || 0)) return Number(b.rating || 0) - Number(a.rating || 0);
        return getDistanceKm(urbanNook.lat, urbanNook.lng, a.lat, a.lng) - getDistanceKm(urbanNook.lat, urbanNook.lng, b.lat, b.lng);
      })
      .slice(0, 5);

    if (!ranked.length || ranked.every(place => place.votes === 0)) {
      topPicksEl.innerHTML = `<button class="top-pick" onclick="decideForMe()">No votes yet · tap 🎲 Decide</button>`;
      return;
    }

    topPicksEl.innerHTML = ranked.map((place, index) => `
      <button class="top-pick" onclick="focusPlace('${escapeJsString(place.name)}')">
        ${index + 1}. ${place.name} · 👍 ${place.votes}
      </button>
    `).join("");
  }

  function focusPlace(placeName) {
    const marker = allMarkers.find(m => m.placeData && m.placeData.name === placeName);
    if (!marker) return;
    map.setView(marker.getLatLng(), 17);
    marker.openPopup();
    document.getElementById("status").textContent = `Focused on ${placeName}.`;
  }

  function decideForMe() {
    const candidates = [...places].filter(place => place.type !== "attraction");
    const voted = candidates
      .map(place => ({ ...place, votes: voteCounts[place.name] || 0, open: isOpenNow(place.hours) }))
      .sort((a, b) => {
        if ((b.votes || 0) !== (a.votes || 0)) return (b.votes || 0) - (a.votes || 0);
        if (b.open !== a.open) return b.open === true ? 1 : -1;
        if (Number(b.rating || 0) !== Number(a.rating || 0)) return Number(b.rating || 0) - Number(a.rating || 0);
        return getDistanceKm(urbanNook.lat, urbanNook.lng, a.lat, a.lng) - getDistanceKm(urbanNook.lat, urbanNook.lng, b.lat, b.lng);
      });
    const pick = voted.find(place => place.votes > 0) || voted[0];
    if (!pick) return;
    focusPlace(pick.name);
    document.getElementById("status").textContent = `Decision: ${pick.name} · 👍 ${voteCounts[pick.name] || 0} · ⭐ ${pick.rating || "n/a"}.`;
  }

  function filterMarkers(type) {
    markerLayer.clearLayers();
    const nowFiltered = [];

    allMarkers.forEach(marker => {
      const place = marker.placeData;
      let show = false;

      if (type === "all") show = true;
      else if (type === "open") show = isOpenNow(place.hours) === true;
      else if (type === "nearby") show = getDistanceKm(urbanNook.lat, urbanNook.lng, place.lat, place.lng) <= 1.5;
      else show = marker.placeType === type;

      if (show) {
        markerLayer.addLayer(marker);
        nowFiltered.push(marker);
      }
    });

    document.getElementById("status").textContent =
      type === "all" ? "Showing all places." : `Showing ${nowFiltered.length} ${type} places.`;

    setTimeout(() => map.invalidateSize(), 100);
  }

  function goHome() {
    map.setView([urbanNook.lat, urbanNook.lng], 16);
    homeMarker.openPopup();
    document.getElementById("status").textContent = "Centred on Urban Nook.";
  }

  function handleGeoError(error) {
    let message = "Location failed.";

    if (error.code === 1) {
      message = "Location permission denied. Allow location access for this website.";
    } else if (error.code === 2) {
      message = "Location unavailable. Turn on GPS/location services.";
    } else if (error.code === 3) {
      message = "Location timed out. Try again outdoors or near a window.";
    }

    alert(message);
    document.getElementById("status").textContent = message;
  }

  function findMe() {
    if (!navigator.geolocation) {
      alert("Geolocation is not supported by this browser.");
      return;
    }

    document.getElementById("status").textContent = "Finding your current location...";

    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const acc = pos.coords.accuracy;

      lastUserLocation = { lat, lng };
      map.setView([lat, lng], 16);

      if (userMarker) map.removeLayer(userMarker);
      if (userCircle) map.removeLayer(userCircle);

      const shareLink = googleMapsLocationLink(lat, lng);

      userMarker = L.marker([lat, lng]).addTo(map)
        .bindPopup(`
          <div class="popup-title">📍 You are here</div>
          Accuracy: about ${Math.round(acc)}m<br><br>
          <div class="popup-actions">
            <a href="${shareLink}" target="_blank">Open</a>
            <a class="search" href="#" onclick="copyText('${shareLink}'); return false;">Copy Link</a>
          </div>
        `)
        .openPopup();

      userCircle = L.circle([lat, lng], {
        radius: acc,
        color: "#2563eb",
        fillColor: "#2563eb",
        fillOpacity: 0.08
      }).addTo(map);

      document.getElementById("status").textContent = `Location found · ${Math.round(acc)}m accuracy.`;
    }, handleGeoError, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
  }

  function shareMyLocation() {
    if (!navigator.geolocation) {
      alert("Geolocation is not supported by this browser.");
      return;
    }

    document.getElementById("status").textContent = "Getting shareable location link...";

    navigator.geolocation.getCurrentPosition(async pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const link = googleMapsLocationLink(lat, lng);

      lastUserLocation = { lat, lng };

      if (navigator.share) {
        try {
          await navigator.share({ title: "My current location", text: "Here is my current location:", url: link });
          document.getElementById("status").textContent = "Location shared.";
        } catch (err) {
          copyText(link);
        }
      } else {
        copyText(link);
      }
    }, handleGeoError, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
  }

  function copyText(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById("status").textContent = "Location link copied.";
        alert("Location link copied.");
      });
    } else {
      prompt("Copy this link:", text);
    }
  }

  function openCheckpoint() {
    window.open("https://www.woodlandscheckpoint.com/", "_blank");
    document.getElementById("status").textContent = "Opened live checkpoint timing site.";
  }

  window.vote = vote;
  window.focusPlace = focusPlace;
  window.decideForMe = decideForMe;
  window.findMe = findMe;
  window.shareMyLocation = shareMyLocation;
  window.goHome = goHome;
  window.filterMarkers = filterMarkers;
  window.openCheckpoint = openCheckpoint;
  window.copyText = copyText;

  updateTopPicks();
</script>
