<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JB Trip Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f7f7f7; }
    header { padding: 14px 16px; background: #111827; color: white; }
    header h1 { margin: 0; font-size: 20px; }
    header p { margin: 4px 0 0; font-size: 13px; opacity: 0.85; }

    .controls {
      display: flex; gap: 8px; padding: 10px; overflow-x: auto;
      background: white; border-bottom: 1px solid #ddd;
    }

    button {
      border: none; padding: 10px 12px; border-radius: 999px;
      background: #2563eb; color: white; font-size: 14px;
      white-space: nowrap; cursor: pointer;
    }

    button.secondary { background: #374151; }
    button.home { background: #dc2626; }

    #status {
      padding: 8px 12px; font-size: 13px;
      background: #fff7ed; color: #7c2d12;
    }

    #map { height: calc(100vh - 132px); width: 100%; }

    .home-marker { font-size: 30px; }
    .food-marker, .mall-marker, .attraction-marker, .massage-marker, .cat-marker {
      font-size: 24px;
    }
  </style>
</head>

<body>
  <header>
    <h1>PHUKET ARANG</h1>
    <p>The Urban Nook + nearby food, malls, massage and cat cafes</p>
  </header>

  <div class="controls">
    <button onclick="findMe()">📍 Show me</button>
    <button class="home" onclick="goHome()">🏠 Urban Nook</button>
    <button class="secondary" onclick="filterMarkers('all')">All</button>
    <button class="secondary" onclick="filterMarkers('food')">Food</button>
    <button class="secondary" onclick="filterMarkers('mall')">Malls</button>
    <button class="secondary" onclick="filterMarkers('massage')">Massage</button>
    <button class="secondary" onclick="filterMarkers('cat')">Cat Cafes</button>
    <button class="secondary" onclick="filterMarkers('attraction')">Attractions</button>
  </div>

  <div id="status">Map centred near The Urban Nook.</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const urbanNook = {
      name: "The Urban Nook",
      type: "home",
      lat: 1.4848,
      lng: 103.7666,
      address: "14, Jalan Rentaka 2, Taman Sri Tebrau, 80050 Johor Bahru"
    };

    const map = L.map("map").setView([urbanNook.lat, urbanNook.lng], 15);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    let userMarker = null;
    let userCircle = null;

    const homeIcon = L.divIcon({ html: "🏠", className: "home-marker", iconSize: [34,34], iconAnchor: [17,17] });
    const foodIcon = L.divIcon({ html: "🍜", className: "food-marker", iconSize: [30,30], iconAnchor: [15,15] });
    const mallIcon = L.divIcon({ html: "🛍️", className: "mall-marker", iconSize: [30,30], iconAnchor: [15,15] });
    const attractionIcon = L.divIcon({ html: "📸", className: "attraction-marker", iconSize: [30,30], iconAnchor: [15,15] });
    const massageIcon = L.divIcon({ html: "💆", className: "massage-marker", iconSize: [30,30], iconAnchor: [15,15] });
    const catIcon = L.divIcon({ html: "🐱", className: "cat-marker", iconSize: [30,30], iconAnchor: [15,15] });

    function getIcon(type) {
      if (type === "food") return foodIcon;
      if (type === "mall") return mallIcon;
      if (type === "massage") return massageIcon;
      if (type === "cat") return catIcon;
      if (type === "attraction") return attractionIcon;
      return foodIcon;
    }

    function googleMapsSearch(place) {
      const query = encodeURIComponent(`${place.name} ${place.address || ""}`);
      return `https://www.google.com/maps/search/?api=1&query=${query}`;
    }

    function distanceFromHome(lat, lng) {
      const R = 6371;
      const dLat = (lat - urbanNook.lat) * Math.PI / 180;
      const dLng = (lng - urbanNook.lng) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(urbanNook.lat * Math.PI / 180) *
        Math.cos(lat * Math.PI / 180) *
        Math.sin(dLng / 2) ** 2;

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      const distance = R * c;

      if (distance < 1) return `${Math.round(distance * 1000)}m from The Urban Nook`;
      return `${distance.toFixed(1)}km from The Urban Nook`;
    }

    const homeMarker = L.marker([urbanNook.lat, urbanNook.lng], { icon: homeIcon }).addTo(map);

    homeMarker.bindPopup(`
      <strong>🏠 ${urbanNook.name}</strong><br>
      ${urbanNook.address}<br><br>
      <a href="${googleMapsSearch(urbanNook)}" target="_blank">Open in Google Maps</a>
    `).openPopup();

    L.circle([urbanNook.lat, urbanNook.lng], {
      radius: 1200,
      color: "#dc2626",
      fillColor: "#dc2626",
      fillOpacity: 0.08
    }).addTo(map);

    const places = [

      },
      {

        type: "food",
        lat: 1.4833,

        note: "Near house · dine-in / takeaway · seafood noodle"
      },
      {

        lat: 1.4860,
        lng: 103.7650,
        address: "15, Jalan Badik 1, Taman Sri Tebrau, 80050 Johor Bahru",
        note: "Sri Tebrau · dine-in · porridge steamboat"
      },
      {
        name: "Hai Kee Seafood Restaurant",
        type: "food",
        lat: 1.4863,
        lng: 103.7653,
        address: "No. 21, Jalan Badik 1, Taman Sri Tebrau, 80050 Johor Bahru",
        note: "Sri Tebrau hawker centre · dine-in / takeaway"
      },
      {
        name: "Project Smoked",
        type: "food",
        lat: 1.4872,
        lng: 103.7667,
        address: "224, Jalan Sutera, Taman Sentosa, 80150 Johor Bahru",
        note: "American BBQ · dine-in / takeaway"
      },
      {
        name: "Restoran Pekin Taman Sentosa",
        type: "food",
        lat: 1.4929,
        lng: 103.7758,
        address: "38, Jalan Baldu 5, Taman Sentosa, 80150 Johor Bahru",
        note: "Chinese restaurant · suckling pig"
      },
      {
        name: "Teck Sing Restaurant",
        type: "food",
        lat: 1.4871,
        lng: 103.7662,
        address: "3 & 5, Jalan Sutera Satu, Taman Sentosa, 80150 Johor Bahru",
        note: "Paper-baked herbal chicken"
      },
      {
        name: "Kam Long Ah Zai Curry Fish Head",
        type: "food",
        lat: 1.4596,
        lng: 103.7643,
        address: "74, Jalan Wong Ah Fook, 80000 Johor Bahru",
        note: "Famous curry fish head"
      },
      {
        name: "Canton-i @ Johor Bahru City Square",
        type: "food",
        lat: 1.4626,
        lng: 103.7634,
        address: "Lot J3-05, Level 3, Johor Bahru City Square",
        note: "Hong Kong cuisine"
      },
      {
        name: "Bottega JB",

        lat: 1.4816,
        lng: 103.7660,
        address: "8, Jalan Meranti, Johor Bahru, 80250",
        note: "Italian cuisine"
      },
      {
        name: "Warakuya Japanese Restaurant",

      },
      {

      },

      // Malls
      {

      {

        note: "Near checkpoint / JB Sentral"
      },

      // Massage
      {
        name: "BKK Thai Spa @ KSL City Mall",
        type: "massage",
        lat: 1.4852,
        lng: 103.7622,
        address: "LG-001, KSL City Mall, 33 Jalan Seladang, Taman Abad",
        note: "Massage option inside KSL City Mall"
      },
      {
        name: "Lotus Wellness Spa @ KSL City",
        type: "massage",
        lat: 1.4852,
        lng: 103.7622,
        address: "KSL City Mall, 33 Jalan Seladang, Taman Abad",
        note: "Massage / wellness spa in KSL area"
      },
      {
        name: "Hanoi 9 Spa @ KSL City",
        type: "massage",

        lng: 103.7622,
        address: "Level 6 Car Park Area, KSL City Mall, Jalan Seladang",
        note: "Massage option at KSL City Mall"
      },
      {
        name: "SQ Massage & Nails @ KSL",

        lng: 103.7622,
        address: "Level 2-01A, KSL City Mall, Johor Bahru",
        note: "Massage and nails at KSL"
      },

      // Cat cafes
      {
        name: "C.A.T.S Cafe Johor Bahru",
        type: "cat",
        lat: 1.4649,
        lng: 103.7525,
        address: "31A, Jalan Abdul Samad, Lorong 2C, 80100 Johor Bahru",
        note: "Cat cafe"
      },
      {
        name: "Meow Me Cat House",
        type: "cat",
        lat: 1.5583,
        lng: 103.7818,
        address: "28-01, Jalan Austin Height 7/7, Taman Mount Austin, 81100 Johor Bahru",
        note: "Cat cafe / cat house in Mount Austin"
      },
      {
        name: "Chucky Cat Cafe @ Komtar JBCC",
        type: "cat",
        lat: 1.4634,
        lng: 103.7621,
        address: "Komtar JBCC, Johor Bahru",
        note: "Cat cafe branch near City Square"
      },

      // Attractions
      {
        name: "Jalan Tan Hiok Nee",
        type: "attraction",
        lat: 1.4569,
        lng: 103.7615,
        address: "Jalan Tan Hiok Nee, Bandar Johor Bahru",
        note: "Heritage street, cafes, photo spots"
      },
      {
        name: "Johor Old Chinese Temple",
        type: "attraction",
        lat: 1.4595,
        lng: 103.7631,
        address: "Lot 653, Jalan Trus, Bandar Johor Bahru",
        note: "Historic temple near City Square"
      }
    ];

    const markerLayer = L.layerGroup().addTo(map);
    const allMarkers = [];

    places.forEach(place => {
      const marker = L.marker([place.lat, place.lng], { icon: getIcon(place.type) });

      marker.bindPopup(`
        <strong>${place.name}</strong><br>
        ${place.note}<br>
        <strong>${distanceFromHome(place.lat, place.lng)}</strong><br><br>
        <small>${place.address}</small><br><br>
        <a href="${googleMapsSearch(place)}" target="_blank">Open in Google Maps</a>
      `);

      marker.placeType = place.type;
      allMarkers.push(marker);
      markerLayer.addLayer(marker);
    });

    function filterMarkers(type) {
      markerLayer.clearLayers();

      allMarkers.forEach(marker => {
        if (type === "all" || marker.placeType === type) {
          markerLayer.addLayer(marker);
        }
      });

      document.getElementById("status").textContent =
        type === "all"
          ? "Showing all food, malls, massage, cat cafes and attractions."
          : `Showing ${type} places.`;
    }

    function goHome() {
      map.setView([urbanNook.lat, urbanNook.lng], 16);
      homeMarker.openPopup();
      document.getElementById("status").textContent = "Centred on The Urban Nook.";
    }

    function findMe() {
      if (!navigator.geolocation) {
        alert("Geolocation is not supported by this browser.");
        return;
      }

      document.getElementById("status").textContent = "Finding your current location...";

      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const acc = pos.coords.accuracy;

        map.setView([lat, lng], 16);

        if (userMarker) map.removeLayer(userMarker);
        if (userCircle) map.removeLayer(userCircle);

        userMarker = L.marker([lat, lng]).addTo(map)
          .bindPopup(`
            <strong>📍 You are here</strong><br>
            Accuracy: about ${Math.round(acc)}m<br><br>
            <a href="https://www.google.com/maps/search/?api=1&query=${lat},${lng}" target="_blank">
              Open my location in Google Maps
            </a>
          `)
          .openPopup();

        userCircle = L.circle([lat, lng], { radius: acc }).addTo(map);

        document.getElementById("status").textContent =
          `Location found. Accuracy: about ${Math.round(acc)}m.`;
      }, () => {
        alert("Location failed. Enable GPS/location permission.");
        document.getElementById("status").textContent =
          "Could not get your location. Check location permissions.";
      }, {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      });
    }
  </script>
</body>
</html>
