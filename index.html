<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Phuket Arang Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    :root {
      --header-bg: #111827;
      --blue: #2563eb;
      --dark: #374151;
      --red: #dc2626;
      --green: #059669;
      --orange-bg: #fff7ed;
      --orange-text: #7c2d12;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      overflow: hidden;
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    #app {
      height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 14px 10px;
      background: var(--header-bg);
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
    }

    header p {
      margin: 3px 0 0;
      font-size: 12px;
      opacity: 0.85;
    }

    .controls {
      display: flex;
      gap: 6px;
      padding: 8px;
      overflow-x: auto;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .controls::-webkit-scrollbar { display: none; }

    button {
      border: none;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--blue);
      color: white;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
    }

    button.secondary { background: var(--dark); }
    button.home { background: var(--red); }
    button.share { background: var(--green); }

    #status {
      padding: 7px 10px;
      font-size: 12px;
      background: var(--orange-bg);
      color: var(--orange-text);
    }

    #map {
      flex: 1;
      width: 100%;
    }

    .home-marker { font-size: 30px; }
    .food-marker, .mall-marker, .attraction-marker, .massage-marker, .cat-marker, .durian-marker {
      font-size: 25px;
    }
  </style>
</head>

<body>
<div id="app">

  <header>
    <h1>PHUKET ARANG</h1>
    <p>Urban Nook + food, malls, massage, cats & durian</p>
  </header>

  <div class="controls">
    <button onclick="findMe()">📍 Me</button>
    <button class="share" onclick="shareMyLocation()">🔗 Share</button>
    <button class="home" onclick="goHome()">🏠 Home</button>

    <!-- ✅ ONE TAP CHECKPOINT -->
    <button onclick="openCheckpoint()">🚗 Checkpoint</button>

    <button class="secondary" onclick="filterMarkers('all')">All</button>
    <button class="secondary" onclick="filterMarkers('food')">🍜</button>
    <button class="secondary" onclick="filterMarkers('mall')">🛍️</button>
    <button class="secondary" onclick="filterMarkers('massage')">💆</button>
    <button class="secondary" onclick="filterMarkers('cat')">🐱</button>
    <button class="secondary" onclick="filterMarkers('durian')">🍈</button>
  </div>

  <div id="status">Ready.</div>
  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const urbanNook = { lat: 1.4848, lng: 103.7666 };

const map = L.map("map").setView([urbanNook.lat, urbanNook.lng], 15);

L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
  maxZoom: 19
}).addTo(map);

// Icons
const homeIcon = L.divIcon({ html: "🏠", className: "home-marker" });
const foodIcon = L.divIcon({ html: "🍜", className: "food-marker" });
const mallIcon = L.divIcon({ html: "🛍️", className: "mall-marker" });
const massageIcon = L.divIcon({ html: "💆", className: "massage-marker" });
const catIcon = L.divIcon({ html: "🐱", className: "cat-marker" });
const durianIcon = L.divIcon({ html: "🍈", className: "durian-marker" });

function getIcon(type) {
  return { food: foodIcon, mall: mallIcon, massage: massageIcon, cat: catIcon, durian: durianIcon }[type];
}

// Map data (kept minimal)
const places = [
  {name:"KSL City Mall",type:"mall",lat:1.4852,lng:103.7622},
  {name:"Mid Valley Southkey",type:"mall",lat:1.5008,lng:103.7778},
  {name:"Teck Sing",type:"food",lat:1.4871,lng:103.7662},
  {name:"Ah Tong Durian",type:"durian",lat:1.4860,lng:103.7610},
  {name:"CATS Cafe",type:"cat",lat:1.4649,lng:103.7525},
  {name:"KSL Massage Cluster",type:"massage",lat:1.4852,lng:103.7622}
];

const layer = L.layerGroup().addTo(map);
const markers = [];

places.forEach(p=>{
  const m = L.marker([p.lat,p.lng],{icon:getIcon(p.type)})
    .bindPopup(`<b>${p.name}</b>`);
  m.type = p.type;
  markers.push(m);
  layer.addLayer(m);
});

function filterMarkers(type){
  layer.clearLayers();
  markers.forEach(m=>{
    if(type==="all"||m.type===type){
      layer.addLayer(m);
    }
  });
}

// Home
L.marker([urbanNook.lat,urbanNook.lng],{icon:homeIcon}).addTo(map);

function goHome(){
  map.setView([urbanNook.lat,urbanNook.lng],16);
}

// GPS
function findMe(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude,longitude}=pos.coords;
    L.marker([latitude,longitude]).addTo(map)
      .bindPopup("📍 You are here").openPopup();
    map.setView([latitude,longitude],16);
  });
}

// Share
function shareMyLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude,longitude}=pos.coords;
    const link = `https://www.google.com/maps?q=${latitude},${longitude}`;

    if (navigator.share) {
      navigator.share({ title: "My location", url: link });
    } else {
      prompt("Copy this:", link);
    }
  });
}

// ✅ ONE TAP CHECKPOINT FUNCTION
function openCheckpoint(){
  window.open("https://www.woodlandscheckpoint.com/", "_blank");
}

</script>
</body>
</html>
